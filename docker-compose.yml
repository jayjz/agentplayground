version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ap-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agentplayground}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentplayground_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-agentplayground}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agentplayground}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - agentplayground

  redis:
    image: redis:7-alpine
    container_name: ap-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - agentplayground
    command: redis-server --appendonly yes

  api:
    build:
      context: .
      dockerfile: ./infra/docker/api.Dockerfile
    container_name: ap-api
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      - DATABASE_URL
      - REDIS_URL
      - SECRET_KEY
      - ENVIRONMENT
      - LOG_LEVEL
      - OPENAI_API_KEY
      - ANTHROPIC_API_KEY
      - LITELLM_MODEL
    volumes:
      - ./apps/api:/app
      - ./data:/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - agentplayground
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: .
      dockerfile: ./infra/docker/worker.Dockerfile
    container_name: ap-worker
    environment:
      - DATABASE_URL
      - REDIS_URL
      - SECRET_KEY
      - ENVIRONMENT
      - LOG_LEVEL
      - OPENAI_API_KEY
      - ANTHROPIC_API_KEY
    volumes:
      - ./apps/api:/app
      - ./data:/data
    depends_on:
      - postgres
      - redis
      - api
    networks:
      - agentplayground
    restart: unless-stopped
    command: python -m app.workers.main

  web:
    build:
      context: .
      dockerfile: ./infra/docker/web.Dockerfile
    container_name: ap-web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-ws://localhost:8000}
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - api
    networks:
      - agentplayground
    restart: unless-stopped

  prefect:
    image: prefecthq/prefect:3-latest
    container_name: ap-prefect
    ports:
      - "4200:4200"
    environment:
      - PREFECT_UI_URL=http://localhost:4200
      - PREFECT_API_URL=http://0.0.0.0:4200/api
    volumes:
      - prefect_data:/root/.prefect
    networks:
      - agentplayground
    command: prefect server start --host 0.0.0.0
    restart: unless-stopped

  # Observability (optional)
  # otel-collector:
  #   image: otel/opentelemetry-collector-contrib:latest
  #   container_name: ap-otel
  #   volumes:
  #     - ./infra/otel/config.yaml:/etc/otelcol-contrib/config.yaml
  #   ports:
  #     - "4317:4317"
  #     - "4318:4318"
  #   networks:
  #     - agentplayground

volumes:
  postgres_data:
  redis_data:
  prefect_data:

networks:
  agentplayground:
    driver: bridge
